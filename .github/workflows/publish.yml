name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set version from release tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
        working-directory: projects/dv-datagrid

      - name: Build library
        run: npm run build:lib

      - name: Publish to npm
        run: npm publish ./dist/dv-datagrid --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
